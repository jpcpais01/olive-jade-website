<body>
<div id="jo-loader" aria-hidden="true">
  <video class="jol-video" autoplay muted loop playsinline preload="auto">
    <source src="loader-bg.mp4" type="video/mp4">
  </video>
  <div class="jol-eyebrow"><span class="jol-eyebrow-dot"></span><span>Summer · MMXXVI</span></div>
  <div class="jol-mark">
    <span class="jol-line l1"><span>Jade</span></span>
    <span class="jol-line l2"><span><em class="jol-amp">&amp;</em> Olive</span></span>
  </div>
  <div class="jol-meter"></div>
  <div class="jol-foot">
    <span>Athens</span><span class="jol-foot-sep">&nbsp;</span>
    <span>Kyoto</span><span class="jol-foot-sep">&nbsp;</span>
    <span>Lisbon</span>
  </div>
</div>
<script>
  // The loader dismisses when:
  //   - the actual hero video on screen fires canplay (signal: window.__joHeroReady = true), AND
  //   - at least 1.6s has passed (so the seal animation completes)
  //   - or 4s ceiling as a safety net
  (function() {
    var loader = document.getElementById('jo-loader');
    if (!loader) return;
    var minMs = 1600;
    var maxMs = 4000;
    var t0 = performance.now();
    function dismiss() {
      loader.classList.add('gone');
      setTimeout(function() { loader.parentNode && loader.parentNode.removeChild(loader); }, 900);
      // Reveal custom scrollbar 1s after loader starts dismissing
      setTimeout(function() {
        var sb = document.getElementById('jo-scrollbar');
        if (sb) sb.classList.add('visible');
      }, 1000);
    }
    function tick() {
      var elapsed = performance.now() - t0;
      if (elapsed >= maxMs) { dismiss(); return; }
      if (elapsed >= minMs && window.__joHeroReady) { dismiss(); return; }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
</script>
<div id="jo-scrollbar" class="jo-scrollbar"><div class="jo-scrollbar-thumb"></div></div>
<script>
  (function() {
    var thumb = document.querySelector('.jo-scrollbar-thumb');
    function update() {
      var doc = document.documentElement;
      var scrollTop = window.scrollY || doc.scrollTop;
      var scrollHeight = doc.scrollHeight - doc.clientHeight;
      var viewH = doc.clientHeight;
      var thumbH = Math.max(40, viewH * (viewH / doc.scrollHeight));
      var thumbTop = scrollHeight > 0 ? (scrollTop / scrollHeight) * (viewH - thumbH) : 0;
      thumb.style.height = thumbH + 'px';
      thumb.style.top = thumbTop + 'px';
    }
    window.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update, { passive: true });
    update();
  })();
</script>
<div id="root"></div>
